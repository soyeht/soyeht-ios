name: macOS Release

on:
  push:
    tags:
      - "mac-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Marketing version, for example 1.0.1"
        required: true
        type: string

permissions:
  contents: write

env:
  APPCAST_URL: https://github.com/${{ github.repository }}/releases/latest/download/appcast.xml
  DERIVED_DATA_PATH: .build/xcode-derived-release
  SOYEHT_SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SOYEHT_SPARKLE_PUBLIC_ED_KEY }}

jobs:
  release:
    name: Build and publish macOS DMG
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3.0"

      - name: Verify build environment
        shell: bash
        run: |
          xcodebuild -version
          swift --version
          sw_vers

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
            tag="mac-v${version}"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#mac-v}"
          fi

          if [[ ! "$version" =~ ^[0-9]+(\.[0-9]+){1,2}([.-][0-9A-Za-z]+)?$ ]]; then
            echo "Invalid version '$version'. Use a tag like mac-v1.0.1." >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check release secrets
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          APPLE_DEVELOPER_ID_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          APPLE_NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for name in \
            SPARKLE_PRIVATE_KEY \
            SOYEHT_SPARKLE_PUBLIC_ED_KEY \
            APPLE_DEVELOPER_ID_P12_BASE64 \
            APPLE_DEVELOPER_ID_P12_PASSWORD \
            APPLE_NOTARY_KEY_P8_BASE64 \
            APPLE_NOTARY_KEY_ID \
            APPLE_NOTARY_ISSUER_ID \
            APPLE_TEAM_ID \
            APPLE_CODESIGN_IDENTITY
          do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing GitHub secret ${name}." >&2
              missing=1
            fi
          done
          exit "${missing}"

      - name: Import Developer ID certificate
        env:
          APPLE_DEVELOPER_ID_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          certificate_path="${RUNNER_TEMP}/developer-id.p12"
          keychain_path="${RUNNER_TEMP}/soyeht-signing.keychain-db"
          keychain_password="$(uuidgen)"

          decode_base64() {
            local value="$1"
            local output="$2"
            if ! printf '%s' "${value}" | base64 --decode > "${output}" 2>/dev/null; then
              printf '%s' "${value}" | base64 -D > "${output}"
            fi
          }

          decode_base64 "${APPLE_DEVELOPER_ID_P12_BASE64}" "${certificate_path}"

          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          security import "${certificate_path}" \
            -k "${keychain_path}" \
            -P "${APPLE_DEVELOPER_ID_P12_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "${keychain_password}" \
            "${keychain_path}"
          security list-keychains -d user -s "${keychain_path}"
          security default-keychain -s "${keychain_path}"
          security find-identity -v -p codesigning "${keychain_path}"

          rm -f "${certificate_path}"
          echo "APPLE_SIGNING_KEYCHAIN=${keychain_path}" >> "${GITHUB_ENV}"

      - name: Prepare optional APNs key
        env:
          SOYEHT_APNS_P8_BASE64: ${{ secrets.SOYEHT_APNS_P8_BASE64 }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${SOYEHT_APNS_P8_BASE64:-}" ]]; then
            echo "SOYEHT_APNS_P8_BASE64 not set; macOS engine will fall back to Bonjour-only pairing."
            exit 0
          fi

          apns_path="${RUNNER_TEMP}/apns.p8"
          if ! printf '%s' "${SOYEHT_APNS_P8_BASE64}" | base64 --decode > "${apns_path}" 2>/dev/null; then
            printf '%s' "${SOYEHT_APNS_P8_BASE64}" | base64 -D > "${apns_path}"
          fi
          chmod 600 "${apns_path}"
          echo "APNS_KEY_PATH=${apns_path}" >> "${GITHUB_ENV}"

      - name: Prepare notary API key
        env:
          APPLE_NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
        shell: bash
        run: |
          set -euo pipefail

          decode_base64() {
            local value="$1"
            local output="$2"
            if ! printf '%s' "${value}" | base64 --decode > "${output}" 2>/dev/null; then
              printf '%s' "${value}" | base64 -D > "${output}"
            fi
          }

          notary_key_path="${RUNNER_TEMP}/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          decode_base64 "${APPLE_NOTARY_KEY_P8_BASE64}" "${notary_key_path}"
          chmod 600 "${notary_key_path}"
          echo "APPLE_NOTARY_KEY_PATH=${notary_key_path}" >> "${GITHUB_ENV}"

      - name: Fetch theyos engine
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          scripts/fetch-engine.sh

      - name: Archive Soyeht for macOS
        id: archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
        shell: bash
        run: |
          set -euo pipefail
          archive_path="${RUNNER_TEMP}/Soyeht.xcarchive"
          rm -rf "${archive_path}"
          xcodebuild \
            -project TerminalApp/SoyehtMac.xcodeproj \
            -scheme SoyehtMac \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "${archive_path}" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            SOYEHT_UPDATE_FEED_URL="$APPCAST_URL" \
            SOYEHT_SPARKLE_PUBLIC_ED_KEY="$SOYEHT_SPARKLE_PUBLIC_ED_KEY" \
            DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="${APPLE_CODESIGN_IDENTITY}" \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            SKIP_INSTALL=NO \
            archive
          echo "archive_path=${archive_path}" >> "$GITHUB_OUTPUT"

      - name: Package notarized DMG
        id: package
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        shell: bash
        run: |
          set -euo pipefail
          archive_dir="$RUNNER_TEMP/soyeht-release"
          dmg_name="Soyeht.dmg"
          dmg_path="$archive_dir/$dmg_name"
          notes_path="$archive_dir/Soyeht.md"

          rm -rf "$archive_dir"
          mkdir -p "$archive_dir"

          ARCHIVE_PATH="${{ steps.archive.outputs.archive_path }}" \
          DMG_OUTPUT_DIR="$archive_dir" \
          EXPORT_PATH="${RUNNER_TEMP}/soyeht-export" \
          DEVELOPER_ID_APPLICATION="${APPLE_CODESIGN_IDENTITY}" \
          TEAM_ID="${APPLE_TEAM_ID}" \
          APPLE_NOTARY_KEY_PATH="${APPLE_NOTARY_KEY_PATH}" \
          APPLE_NOTARY_KEY_ID="${APPLE_NOTARY_KEY_ID}" \
          APPLE_NOTARY_ISSUER_ID="${APPLE_NOTARY_ISSUER_ID}" \
          APNS_KEY_SOURCE="${APNS_KEY_PATH:-}" \
            scripts/build-dmg.sh

          test -f "$dmg_path"

          tag_body="$(git tag -l --format='%(contents)' '${{ steps.version.outputs.tag }}' || true)"
          if [[ -z "$tag_body" ]]; then
            tag_body="Soyeht ${{ steps.version.outputs.version }}"
          fi
          printf '%s\n' "$tag_body" > "$notes_path"

          echo "archive_dir=$archive_dir" >> "$GITHUB_OUTPUT"
          echo "dmg_path=$dmg_path" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$dmg_name" >> "$GITHUB_OUTPUT"
          echo "notes_path=$notes_path" >> "$GITHUB_OUTPUT"

      - name: Generate Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          sparkle_bin="$DERIVED_DATA_PATH/SourcePackages/artifacts/sparkle/Sparkle/bin"
          generate_appcast="$sparkle_bin/generate_appcast"
          if [[ ! -x "$generate_appcast" ]]; then
            echo "Sparkle generate_appcast tool not found at $generate_appcast" >&2
            exit 1
          fi

          release_url="https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}"
          printf '%s' "$SPARKLE_PRIVATE_KEY" | "$generate_appcast" \
            --ed-key-file - \
            --download-url-prefix "$release_url/" \
            --embed-release-notes \
            --maximum-versions 1 \
            --maximum-deltas 0 \
            -o "${{ steps.package.outputs.archive_dir }}/appcast.xml" \
            "${{ steps.package.outputs.archive_dir }}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          title="Soyeht macOS ${{ steps.version.outputs.version }}"
          body_file="${{ steps.package.outputs.notes_path }}"
          appcast_path="${{ steps.package.outputs.archive_dir }}/appcast.xml"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" \
              "${{ steps.package.outputs.dmg_path }}" \
              "$appcast_path" \
              --clobber
          else
            gh release create "$tag" \
              "${{ steps.package.outputs.dmg_path }}" \
              "$appcast_path" \
              --title "$title" \
              --notes-file "$body_file"
          fi

      - name: Clean up signing keychain
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          security delete-keychain "${APPLE_SIGNING_KEYCHAIN:-${RUNNER_TEMP}/soyeht-signing.keychain-db}" || true
