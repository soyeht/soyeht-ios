name: Accessibility Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "TerminalApp/Soyeht/**"
      - "TerminalApp/SoyehtMac/**"
      - "Packages/SoyehtCore/**"

env:
  DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer

jobs:
  snapshot-accessibility:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build RelayStreamGuestFFI XCFramework
        env:
          RELAY_STREAM_GUEST_FFI_PROFILE: release
        run: scripts/bootstrap-relay-stream-guest-ffi.sh

      - name: iOS Accessibility Snapshot Tests (RTL + AX5)
        run: |
          SIM_ARCH="$(uname -m)"
          xcodebuild test \
            -project TerminalApp/Soyeht.xcodeproj \
            -scheme Soyeht \
            -skipPackagePluginValidation \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest,arch=${SIM_ARCH}" \
            -only-testing:SoyehtTests/AccessibilitySnapshotTests \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
            SNAPSHOT_RECORD_MODE=NO \
            TEST_LOCALE=ar \
            || true

          xcodebuild test \
            -project TerminalApp/Soyeht.xcodeproj \
            -scheme Soyeht \
            -skipPackagePluginValidation \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest,arch=${SIM_ARCH}" \
            -only-testing:SoyehtTests/AccessibilitySnapshotTests \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
            SNAPSHOT_RECORD_MODE=NO \
            DYNAMIC_TYPE_SIZE=AX5

      - name: Verify no snapshot regressions
        run: |
          git diff --exit-code TerminalApp/SoyehtTests/__Snapshots__/ || \
            (echo "Snapshot baselines changed — run locally and commit updated baselines" && exit 1)
