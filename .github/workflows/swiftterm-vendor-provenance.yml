name: SwiftTerm Vendor Provenance

on:
  pull_request:
    paths:
      - ".github/workflows/swiftterm-vendor-provenance.yml"
      - "docs/vendor/swiftterm-*.md"
      - "docs/vendor/swiftterm-*.tsv"
      - "scripts/verify-swiftterm-vendor-provenance.sh"
      - "Sources/SwiftTerm/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify SwiftTerm vendor provenance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out complete history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify immutable anchors and patch inventories
        run: scripts/verify-swiftterm-vendor-provenance.sh
