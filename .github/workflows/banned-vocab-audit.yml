name: Banned Vocabulary Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "**/*.xcstrings"
      - "Packages/SoyehtCore/**"

env:
  DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer

jobs:
  audit:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v5

      - name: Build banned-vocab-audit tool
        run: swift build --package-path Packages/SoyehtCore --product banned-vocab-audit

      - name: Run banned vocabulary audit
        run: |
          XCSTRINGS=$(find . -name "*.xcstrings" \
            ! -path "./.build/*" \
            ! -path "./DerivedData/*")
          if [ -z "$XCSTRINGS" ]; then
            echo "No .xcstrings files found."
            exit 0
          fi
          swift run --package-path Packages/SoyehtCore banned-vocab-audit $XCSTRINGS
