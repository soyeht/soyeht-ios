name: Swift

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer

jobs:
  build:

    runs-on: macos-15

    steps:
    - uses: actions/checkout@v5

#    - name: Checkout esctest for testing
#      uses: actions/checkout@v5
#      with:
#        repository: migueldeicaza/esctest
#        ref: python3
#        path: esctest

    - name: List all files, because this is driving me insane, this does not repro anywhere but github
      run: ls -lR

    - name: Xcode Mac Build
      run: |
        xcodebuild \
          -project TerminalApp/SoyehtMac.xcodeproj \
          -scheme SoyehtMac \
          -destination "platform=macOS,arch=$(uname -m)"

    - name: Soyeht iOS Unit Tests
      run: |
        SIM_ARCH="$(uname -m)"
        xcodebuild test \
          -project TerminalApp/Soyeht.xcodeproj \
          -scheme Soyeht \
          -destination "platform=iOS Simulator,name=iPhone 16,OS=latest,arch=${SIM_ARCH}" \
          CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

    - name: Swift Package Build
      run: swift build

    - name: Run tests
      env:
        SWIFT_TEST_DISABLE_PARALLELIZATION: "1"
      run: swift test

    - name: Coverage
      env:
        SWIFT_TEST_DISABLE_PARALLELIZATION: "1"
      run: |
        swift test --enable-code-coverage
        BINDIR=$(swift build --show-bin-path)
        xcrun llvm-cov report "$BINDIR/SwiftTermPackageTests.xctest/Contents/MacOS/SwiftTermPackageTests" --instr-profile=.build/debug/codecov/default.profdata -use-color
