name: Swift

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer

jobs:
  build:

    runs-on: macos-15

    steps:
    - uses: actions/checkout@v5

#    - name: Checkout esctest for testing
#      uses: actions/checkout@v5
#      with:
#        repository: migueldeicaza/esctest
#        ref: python3
#        path: esctest

    - name: List all files, because this is driving me insane, this does not repro anywhere but github
      run: ls -lR

    - name: Mobile Claw VPN DEV E2E tooling tests
      run: |
        bash -n \
          scripts/mobile-claw-vpn-dev-e2e-env.sh \
          scripts/mobile-claw-vpn-dev-e2e-preflight.sh \
          scripts/mobile-claw-vpn-dev-e2e-runner.sh \
          scripts/mobile-claw-vpn-dev-e2e-owner-request.sh \
          scripts/test-mobile-claw-vpn-dev-e2e-preflight.sh \
          scripts/test-mobile-claw-vpn-dev-e2e-runner.sh \
          scripts/test-mobile-claw-vpn-dev-e2e-owner-request.sh \
          scripts/test-mobile-claw-vpn-dev-local-presence.sh \
          scripts/test-mobile-claw-vpn-dev-e2e-probe-source.sh
        python3 -c 'import ast, pathlib; ast.parse(pathlib.Path("scripts/mobile-claw-vpn-dev-e2e-owner-request.py").read_text())'
        scripts/test-mobile-claw-vpn-dev-e2e-preflight.sh
        scripts/test-mobile-claw-vpn-dev-e2e-runner.sh
        scripts/test-mobile-claw-vpn-dev-e2e-owner-request.sh
        scripts/test-mobile-claw-vpn-dev-local-presence.sh
        scripts/test-mobile-claw-vpn-dev-e2e-probe-source.sh

    - name: Install Rust toolchain
      run: |
        if ! command -v rustup >/dev/null 2>&1; then
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.cargo/bin:$PATH"
        fi
        rustup toolchain install stable --profile minimal
        rustup default stable

    - name: Build RelayStreamGuestFFI XCFramework
      env:
        RELAY_STREAM_GUEST_FFI_PROFILE: release
      run: scripts/bootstrap-relay-stream-guest-ffi.sh

    - name: Xcode Mac Build
      run: |
        xcodebuild \
          -project TerminalApp/SoyehtMac.xcodeproj \
          -scheme SoyehtMac \
          -skipPackagePluginValidation \
          -destination "platform=macOS,arch=$(uname -m)"

    - name: Soyeht iOS Unit Tests
      run: |
        SIM_ARCH="$(uname -m)"
        xcodebuild test \
          -project TerminalApp/Soyeht.xcodeproj \
          -scheme Soyeht \
          -skipPackagePluginValidation \
          -destination "platform=iOS Simulator,name=iPhone 16,OS=latest,arch=${SIM_ARCH}" \
          CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

    - name: Swift Package Build
      run: swift build

    - name: Run tests
      env:
        SWIFT_TEST_DISABLE_PARALLELIZATION: "1"
      run: swift test

    - name: Coverage
      env:
        SWIFT_TEST_DISABLE_PARALLELIZATION: "1"
      run: |
        swift test --enable-code-coverage
        BINDIR=$(swift build --show-bin-path)
        xcrun llvm-cov report "$BINDIR/SwiftTermPackageTests.xctest/Contents/MacOS/SwiftTermPackageTests" --instr-profile=.build/debug/codecov/default.profdata -use-color
