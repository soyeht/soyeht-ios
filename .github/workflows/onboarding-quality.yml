name: Onboarding Quality Gate

on:
  pull_request:
    branches: [main]
    paths:
      - "TerminalApp/Soyeht/Onboarding/**"
      - "TerminalApp/Soyeht/APNs/**"
      - "TerminalApp/Soyeht/Home/**"
      - "TerminalApp/SoyehtMac/Welcome/**"
      - "TerminalApp/SoyehtMac/Continuity/**"
      - "Packages/SoyehtCore/**"

env:
  DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer

jobs:
  # ── SoyehtCore package unit tests ────────────────────────────────────────────
  core-tests:
    name: SoyehtCore Unit Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Run SoyehtCore tests
        env:
          SWIFT_TEST_DISABLE_PARALLELIZATION: "1"
        run: swift test --package-path Packages/SoyehtCore -v

  # ── LocalizedStringResource pattern check (FR-006) ──────────────────────────
  localized-string-pattern:
    name: LocalizedStringResource Pattern
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Verify no bare Text("literal") in onboarding views
        run: |
          # Allow: Text("8pt"), Text("[\(tag)]"), Text("\(bytes) / \(total) MB"),
          # Text(verbatim:), and non-localized UI labels like Text("SF Symbol name").
          # Flag: Text("word") with real words that look like UI strings.
          VIOLATIONS=$(grep -rn --include="*.swift" \
            -E 'Text\("[A-Za-záàãâéêíóôõúç][^"\\)]{5,}[a-záàãâéêíóôõúç]"\)' \
            TerminalApp/Soyeht/Onboarding \
            TerminalApp/Soyeht/APNs \
            TerminalApp/Soyeht/Home \
            | grep -v 'Text(verbatim:)' \
            | grep -v 'LocalizedStringResource' \
            || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "Bare Text(\"literal\") strings found — use LocalizedStringResource:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "LocalizedStringResource pattern OK."

  # ── iOS onboarding build check ────────────────────────────────────────────────
  ios-build:
    name: iOS Build (onboarding targets)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Build Soyeht iOS
        run: |
          SIM_ARCH="$(uname -m)"
          xcodebuild build \
            -project TerminalApp/Soyeht.xcodeproj \
            -scheme Soyeht \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest,arch=${SIM_ARCH}" \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
            | xcpretty || true

      - name: Run iOS unit tests
        run: |
          SIM_ARCH="$(uname -m)"
          xcodebuild test \
            -project TerminalApp/Soyeht.xcodeproj \
            -scheme Soyeht \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest,arch=${SIM_ARCH}" \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
            | xcpretty || true
