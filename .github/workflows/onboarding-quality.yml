name: Onboarding Quality Gate

on:
  pull_request:
    branches: [main]
    paths:
      - "TerminalApp/Soyeht/Onboarding/**"
      - "TerminalApp/Soyeht/APNs/**"
      - "TerminalApp/Soyeht/Home/**"
      - "TerminalApp/SoyehtMac/Welcome/**"
      - "TerminalApp/SoyehtMac/Continuity/**"
      - "Packages/SoyehtCore/**"

env:
  DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer

jobs:
  # ── SoyehtCore package unit tests ────────────────────────────────────────────
  core-tests:
    name: SoyehtCore Unit Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Run SoyehtCore tests
        env:
          SWIFT_TEST_DISABLE_PARALLELIZATION: "1"
        run: swift test --package-path Packages/SoyehtCore -v

  # ── Banned vocabulary (CopyVoiceAuditor) ────────────────────────────────────
  copy-voice-audit:
    name: Copy Voice + Banned Vocab Audit
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build banned-vocab-audit tool
        run: swift build --package-path Packages/SoyehtCore --product banned-vocab-audit

      - name: Audit onboarding strings
        run: |
          XCSTRINGS=$(find TerminalApp/Soyeht -name "*.xcstrings" \
            ! -path "*/DerivedData/*")
          if [ -z "$XCSTRINGS" ]; then
            echo "No .xcstrings files found in TerminalApp/Soyeht — skipping."
            exit 0
          fi
          swift run --package-path Packages/SoyehtCore banned-vocab-audit $XCSTRINGS

      - name: Audit onboarding Swift source for raw banned terms
        run: |
          # Grep for common banned words in defaultValue: strings.
          # This catches strings not yet exported to .xcstrings.
          BANNED="erro\b|falha\b|\bproblema\b|\binválido\b|\brejeitado\b|\baguarde\b|\bcarregando\b|\bprocessando\b|\bsucesso\b|\bconcluído\b"
          MATCHES=$(grep -rn --include="*.swift" -E "defaultValue:.*\"[^\"]*($BANNED)" \
            TerminalApp/Soyeht/Onboarding \
            TerminalApp/Soyeht/APNs \
            TerminalApp/Soyeht/Home || true)
          if [ -n "$MATCHES" ]; then
            echo "Banned vocabulary found in defaultValue: strings:"
            echo "$MATCHES"
            exit 1
          fi
          echo "No banned vocabulary found."

  # ── LocalizedStringResource pattern check (FR-006) ──────────────────────────
  localized-string-pattern:
    name: LocalizedStringResource Pattern
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Verify no bare Text("literal") in onboarding views
        run: |
          # Allow: Text("8pt"), Text("[\(tag)]"), Text("\(bytes) / \(total) MB"),
          # Text(verbatim:), and non-localized UI labels like Text("SF Symbol name").
          # Flag: Text("word") with real words that look like UI strings.
          VIOLATIONS=$(grep -rn --include="*.swift" \
            -E 'Text\("[A-Za-záàãâéêíóôõúç][^"\\)]{5,}[a-záàãâéêíóôõúç]"\)' \
            TerminalApp/Soyeht/Onboarding \
            TerminalApp/Soyeht/APNs \
            TerminalApp/Soyeht/Home \
            | grep -v 'Text(verbatim:)' \
            | grep -v 'LocalizedStringResource' \
            || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "Bare Text(\"literal\") strings found — use LocalizedStringResource:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "LocalizedStringResource pattern OK."

  # ── iOS onboarding build check ────────────────────────────────────────────────
  ios-build:
    name: iOS Build (onboarding targets)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build Soyeht iOS
        run: |
          SIM_ARCH="$(uname -m)"
          xcodebuild build \
            -project TerminalApp/Soyeht.xcodeproj \
            -scheme Soyeht \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest,arch=${SIM_ARCH}" \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
            | xcpretty || true

      - name: Run iOS unit tests
        run: |
          SIM_ARCH="$(uname -m)"
          xcodebuild test \
            -project TerminalApp/Soyeht.xcodeproj \
            -scheme Soyeht \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest,arch=${SIM_ARCH}" \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
            | xcpretty || true
