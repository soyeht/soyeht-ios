name: Snapshot Record

on:
  push:
    branches: [017-onboarding-canonical]
    paths: [.github/workflows/snapshot-record.yml]

env:
  DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer

jobs:
  record:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v5

      - name: Delete existing baselines so swift-snapshot-testing records fresh ones
        run: rm -f TerminalApp/SoyehtTests/__Snapshots__/**/*.png

      - name: Record snapshot baselines
        run: |
          SIM_ARCH="$(uname -m)"
          xcodebuild test \
            -project TerminalApp/Soyeht.xcodeproj \
            -scheme Soyeht \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest,arch=${SIM_ARCH}" \
            -only-testing:SoyehtTests/ParkingLotSnapshotTests \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
          || true

      - name: Upload recorded baselines
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-baselines
          path: TerminalApp/SoyehtTests/__Snapshots__/
          if-no-files-found: error
